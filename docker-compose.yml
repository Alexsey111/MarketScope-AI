version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: marketscope-db
    environment:
      POSTGRES_DB: marketscope
      POSTGRES_USER: marketscope_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketscope_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: marketscope-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketscope-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://marketscope_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/marketscope
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      FREE_DAILY_LIMIT: 5
      PRO_DAILY_LIMIT: 100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 4

  # Celery Worker
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketscope-celery
    environment:
      DATABASE_URL: postgresql://marketscope_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/marketscope
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    command: celery -A celery_app.celery_app worker --loglevel=info --concurrency=4

  # Celery Flower (Monitoring)
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketscope-flower
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
    command: celery -A celery_app flower --port=5555

  # Telegram Bot (Optional)
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketscope-bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      DATABASE_URL: postgresql://marketscope_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/marketscope
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: python main.py
    profiles:
      - bot  # Start only when: docker-compose --profile bot up

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: marketscope-network
